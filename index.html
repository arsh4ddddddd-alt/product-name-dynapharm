<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Management Stock - </title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    <style>
        :root { --blue: #0046ad; --red: #d93025; --green: #2e7d32; --text: #333; }
        body { font-family: -apple-system, sans-serif; background: #f0f2f5; margin: 0; padding: 15px; color: var(--text); }
        
        .container { max-width: 1100px; margin: auto; background: white; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); overflow: hidden; }
        
        .header { background: var(--blue); color: white; padding: 20px; text-align: center; }
        .header h1 { margin: 0; font-size: 22px; text-transform: uppercase; }
        
        .search-box { padding: 15px; background: #fffde7; border-bottom: 1px solid #eee; }
        #searchInput { width: 100%; padding: 12px; border: 2px solid #ddd; border-radius: 8px; font-size: 16px; outline: none; }

        .table-wrapper { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; min-width: 800px; }
        th { background: #f8f9fa; color: var(--blue); padding: 12px 10px; font-size: 11px; text-transform: uppercase; border-bottom: 2px solid #eee; text-align: left; }
        td { padding: 8px 10px; border-bottom: 1px solid #eee; font-size: 14px; }
        
        .qty-input { width: 60px; padding: 8px; border: 1px solid #ccc; border-radius: 4px; text-align: center; font-weight: bold; }
        .qty-input:focus { border-color: var(--blue); outline: none; background: #e3f2fd; }
        
        .remaining-val { font-weight: bold; color: var(--red); text-align: center; }
        .code-cell { font-family: monospace; font-weight: bold; color: var(--red); }
        .price-cell { font-weight: bold; text-align: right; color: var(--green); }

        .actions { padding: 20px; background: #f8f9fa; }
        .btn-pdf { background: var(--red); color: white; border: none; padding: 15px; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 16px; width: 100%; transition: 0.3s; }
        .btn-pdf:hover { background: #b71c1c; }
        
        .footer { text-align: center; padding: 20px; font-size: 11px; color: #888; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>Gestion de Stock Journalière</h1>
        <p> — Rapport d'Inventaire Complet</p>
    </div>

    <div class="search-box">
        <input type="text" id="searchInput" placeholder="Rechercher un produit..." onkeyup="filterTable()">
    </div>

    <div class="table-wrapper">
        <table id="productTable">
            <thead>
                <tr>
                    <th>Code</th>
                    <th>Désignation</th>
                    <th style="text-align: right;">Prix Unit.</th>
                    <th style="text-align: center;">Stock Initial</th>
                    <th style="text-align: center;">Vendu</th>
                    <th style="text-align: center;">Restant</th>
                </tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>

    <div class="actions">
        <button class="btn-pdf" onclick="generatePDF()">📄 GENERER RAPPORT PDF AVEC PRIX TOTAL</button>
    </div>
</div>

<div class="footer">
    Developed by: <b>ARSHAD</b> | 2026 Inventory System
</div>

<script>
    const products = [
        {code: "DRC1201", name: "GINKO GINSENG COFFEE", initial: 0, sold: 0, price: 13.00},
        {code: "DRC1202", name: "GREEN TEA GANO COFFEE", initial: 0, sold: 0, price: 14.00},
        {code: "DRC1203", name: "KACIP FATIMA GANO COFFEE", initial: 0, sold: 0, price: 14.00},
        {code: "DRC1204", name: "TONGKAT MACCA COFFEE", initial: 0, sold: 0, price: 14.00},
        {code: "DRC1205", name: "CAPPUCCINO GANO COFFEE", initial: 0, sold: 0, price: 15.00},
        {code: "DRC1802A", name: "ALFALFA GUARANA 500ML", initial: 0, sold: 0, price: 20.00},
        {code: "DRC1804", name: "GANODERMA COFFEE (20s)", initial: 0, sold: 0, price: 11.00},
        {code: "DRC1810", name: "YEE GANO 90s", initial: 0, sold: 0, price: 23.00},
        {code: "DRC1811", name: "YEEGARLIC 90's", initial: 0, sold: 0, price: 23.00},
        {code: "DRC1814", name: "GANO CHOCOLATE 30s", initial: 0, sold: 0, price: 19.00},
        {code: "DRC1817", name: "PRESIDENT COFFEE 4 IN 1", initial: 0, sold: 0, price: 15.00},
        {code: "DRC1818", name: "BLACK TONGKAT ALI COFFEE", initial: 0, sold: 0, price: 14.00},
        {code: "DRC2802", name: "GOAT MILK TABS 150's", initial: 0, sold: 0, price: 16.00},
        {code: "DRC2804", name: "SOYBEAN POWDER", initial: 0, sold: 0, price: 17.00},
        {code: "DRC2805", name: "SOLUBLE SPIRULLINA", initial: 0, sold: 0, price: 17.00},
        {code: "DRC2807", name: "SPIRULINA (300's)", initial: 0, sold: 0, price: 22.00},
        {code: "DRC2812", name: "HERBA MAHARANI", initial: 0, sold: 0, price: 36.00},
        {code: "DRC2813", name: "GINGER SOYBEAN", initial: 0, sold: 0, price: 14.00},
        {code: "DRC2814", name: "GOAT MILK PREMIX", initial: 0, sold: 0, price: 15.00},
        {code: "DRC3804", name: "DYNA TONIC 780ml", initial: 0, sold: 0, price: 33.00},
        {code: "DRC3809", name: "YEE YANG YEN 90's", initial: 0, sold: 0, price: 23.00},
        {code: "DRC3810", name: "RED GINSENG COFFEE", initial: 0, sold: 0, price: 13.00},
        {code: "DRC3812", name: "GREEN TEA CAPSULE 60's", initial: 0, sold: 0, price: 23.00},
        {code: "DRC3814", name: "PROLINK 20's", initial: 0, sold: 0, price: 36.00},
        {code: "DRC4803", name: "GINSENG HONEY & GINGER", initial: 0, sold: 0, price: 17.00},
        {code: "DRC4805", name: "GINSENG CAPSULE 90s", initial: 0, sold: 0, price: 31.00},
        {code: "DRC4810", name: "TONGKAT ALI COFFEE (20s)", initial: 0, sold: 0, price: 11.00},
        {code: "DRC4811", name: "GINALI CAPSULE 100's", initial: 0, sold: 0, price: 27.00},
        {code: "DRC4815", name: "YEEGINKGO TABLET 90's", initial: 0, sold: 0, price: 23.00},
        {code: "DRC4817", name: "MILK THISTLE 120's", initial: 0, sold: 0, price: 36.00},
        {code: "DRC4821", name: "TONGKAT ALI 100's", initial: 0, sold: 0, price: 21.00},
        {code: "DRC4824", name: "SEA CUCUMBER JELLY", initial: 0, sold: 0, price: 31.00},
        {code: "DRC5802N", name: "NONI 500ml", initial: 0, sold: 0, price: 26.00},
        {code: "DRC5803", name: "NONI PLUS TEA 30's", initial: 0, sold: 0, price: 19.00},
        {code: "DRC5806", name: "DYNA 'S' TABLET 120's", initial: 0, sold: 0, price: 21.00},
        {code: "DRC9918", name: "DYNA SERENOA 100's", initial: 0, sold: 0, price: 32.00}
    ];

    function calculate(index) {
        const initVal = parseInt(document.getElementById(`init-${index}`).value) || 0;
        const soldVal = parseInt(document.getElementById(`sold-${index}`).value) || 0;
        const remaining = initVal - soldVal;
        
        document.getElementById(`rem-${index}`).innerText = remaining;
        
        products[index].initial = initVal;
        products[index].sold = soldVal;
    }

    function displayProducts() {
        const body = document.getElementById('tableBody');
        body.innerHTML = products.map((p, index) => `
            <tr>
                <td class="code-cell">${p.code}</td>
                <td>${p.name}</td>
                <td class="price-cell">$${p.price.toFixed(2)}</td>
                <td style="text-align: center;">
                    <input type="number" class="qty-input" id="init-${index}" value="${p.initial === 0 ? '' : p.initial}" placeholder="0" oninput="calculate(${index})">
                </td>
                <td style="text-align: center;">
                    <input type="number" class="qty-input" id="sold-${index}" value="${p.sold === 0 ? '' : p.sold}" placeholder="0" oninput="calculate(${index})">
                </td>
                <td class="remaining-val" id="rem-${index}">${p.initial - p.sold}</td>
            </tr>
        `).join('');
    }

    function filterTable() {
        const query = document.getElementById('searchInput').value.toUpperCase();
        const rows = document.getElementById('tableBody').getElementsByTagName('tr');
        for (let row of rows) {
            const text = row.textContent.toUpperCase();
            row.style.display = text.includes(query) ? "" : "none";
        }
    }

    function generatePDF() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        const date = new Date().toLocaleDateString();

        doc.setFontSize(18);
        doc.setTextColor(0, 70, 173);
        doc.text("RAPPORT D'INVENTAIRE ", 105, 20, { align: "center" });
        
        doc.setFontSize(10);
        doc.setTextColor(100);
        doc.text(`Date: ${date} | Rapport de Ventes Journalières`, 105, 28, { align: "center" });

        const tableData = products.map(p => {
            const remaining = p.initial - p.sold;
            const totalPrice = p.sold * p.price; // Calculation for total
            
            return [
                p.code, 
                p.name, 
                "$" + p.price.toFixed(2),
                p.initial === 0 ? "" : p.initial, 
                p.sold === 0 ? "" : p.sold, 
                remaining === 0 ? "" : remaining,
                p.sold > 0 ? "$" + totalPrice.toFixed(2) : "" // Blank if nothing sold
            ];
        });

        doc.autoTable({
            startY: 35,
            head: [['CODE', 'DÉSIGNATION', 'PRIX UNIT.', 'INITIAL', 'VENDU', 'RESTE', 'PRIX TOTAL']],
            body: tableData,
            headStyles: { fillColor: [0, 70, 173] },
            theme: 'grid',
            styles: { fontSize: 7.5 }, // Slightly smaller font to fit extra column
            columnStyles: {
                2: { halign: 'right' },
                3: { halign: 'center' },
                4: { halign: 'center' },
                5: { halign: 'center', fontStyle: 'bold' },
                6: { halign: 'right', fontStyle: 'bold', textColor: [46, 125, 50] } // Green for total
            }
        });
        
        doc.save(`Rapport_Final_${date}.pdf`);
    }

    displayProducts();
</script>

</body>
</html>
